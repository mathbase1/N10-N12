/* -------------------- standard form input (EXP -> superscript) -------------------- */
const SF_SUP = {
  "0":"⁰","1":"¹","2":"²","3":"³","4":"⁴","5":"⁵","6":"⁶","7":"⁷","8":"⁸","9":"⁹",
  "-":"⁻","+":"⁺"
};
const SF_UNSUP = {
  "⁰":"0","¹":"1","²":"2","³":"3","⁴":"4","⁵":"5","⁶":"6","⁷":"7","⁸":"8","⁹":"9",
  "⁻":"-","⁺":"+"
};

function sfEscapeHtml(s){
  return String(s??"")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}
function sfUnsupAll(s){
  return String(s??"").replace(/[⁰¹²³⁴⁵⁶⁷⁸⁹⁻⁺]/g, ch => (SF_UNSUP[ch] ?? ch));
}
function sfSupDigits(s){
  return String(s??"").replace(/[0-9\-\+]/g, ch => (SF_SUP[ch] ?? ch));
}

function sfToHTML(raw){
  const s0 = String(raw ?? "").trim();
  if(!s0) return "";
  const plain = sfUnsupAll(s0).replace(/\s+/g,"");

  // Display E-notation as ×10^n.
  let m = plain.match(/^([+-]?(?:\d+(?:\.\d+)?|\.\d+))[eE]([+-]?\d*)$/);
  if(m){
    const A = m[1] ?? "";
    const n = m[2] ?? "";
    return `${sfEscapeHtml(A)}<span class="mul">×</span>10<sup>${sfEscapeHtml(n || "□")}</sup>`;
  }

  // Display A×10n or A×10^n (caret optional)
  m = plain.match(/^([+-]?(?:\d+(?:\.\d+)?|\.\d+))(?:×|x|\*)10\^?([+-]?\d*)$/i);
  if(m){
    const A = m[1] ?? "";
    const n = m[2] ?? "";
    return `${sfEscapeHtml(A)}<span class="mul">×</span>10<sup>${sfEscapeHtml(n || "□")}</sup>`;
  }

  // Fallback: show as typed (still replaces × with styled ×).
  return sfEscapeHtml(s0).replace(/×/g, `<span class="mul">×</span>`);
}

function sfSyncPreview(targetId){
  const el = document.getElementById(targetId);
  const box = document.getElementById(targetId+"Box");
  if(!el || !box) return;
  box.innerHTML = sfToHTML(el.value);
}

function sfSetCaretEnd(el){
  try{
    const n = el.value.length;
    el.setSelectionRange(n, n);
  }catch(err){}
}

function sfEnsureTen(v){
  v = String(v ?? "");
  if(/(?:×|x|\*)10/.test(v)) return v;
  if(v==="" || v==="-") v = (v==="-") ? "-1" : "1";
  return v + "×10";
}

function sfGetExpPart(v){
  const m = String(v ?? "").match(/(?:×|x|\*)10(.*)$/);
  return m ? (m[1] ?? "") : "";
}

function sfToggleMantissaSign(v){
  v = String(v ?? "");
  if(v.startsWith("-")) return v.slice(1);
  return v ? "-" + v : "-";
}

function sfToggleExponentSign(v){
  v = String(v ?? "");
  const m = v.match(/^(.*?)(?:×|x|\*)10(.*)$/);
  if(!m) return sfToggleMantissaSign(v);

  const head = m[1] ?? "";
  const expRaw = m[2] ?? "";
  const expPlain = sfUnsupAll(expRaw);

  let outPlain = expPlain;
  if(outPlain.startsWith("-")) outPlain = outPlain.slice(1);
  else outPlain = "-" + outPlain.replace(/^\+/, "");

  const outSup = sfSupDigits(outPlain);
  return head + "×10" + outSup;
}

function sfBackspace(v){
  v = String(v ?? "");
  if(!v) return "";

  const last = v.slice(-1);
  if(typeof SF_UNSUP[last] !== "undefined"){
    // delete superscript digit/sign
    v = v.slice(0,-1);
    return v;
  }

  if(v.endsWith("×10")) return v.slice(0,-3);
  return v.slice(0,-1);
}

// Keep the preview in sync while typing
preview.addEventListener("input", (e)=>{
  const el = e.target;
  if(!(el instanceof HTMLInputElement)) return;
  if(!el.classList.contains("sfinput")) return;

  // If the user deletes the ×10 part, cancel EXP mode
  if(el.dataset.sfExp === "1" && !/(?:×|x|\*)10/.test(el.value)){
    el.dataset.sfExp = "0";
    const ctrl = preview.querySelector(`.sfctrl[data-sf-target="${el.id}"]`);
    const expBtn = ctrl ? ctrl.querySelector('button[data-act="exp"]') : null;
    if(expBtn){
      expBtn.classList.remove("on");
      expBtn.setAttribute("aria-pressed","false");
    }
  }

  sfSyncPreview(el.id);
});

// Keyboard typing: when EXP is ON, digits become superscripts (no E and no caret notation).
preview.addEventListener("keydown", (e)=>{
  const el = e.target;
  if(!(el instanceof HTMLInputElement)) return;
  if(!el.classList.contains("sfinput")) return;
  if(el.dataset.sfExp !== "1") return;

  const key = e.key;

  // Always keep typing at the end while EXP is on
  if(key==="ArrowLeft" || key==="ArrowRight" || key==="Home" || key==="End"){
    e.preventDefault();
    sfSetCaretEnd(el);
    return;
  }

  if(key==="Backspace"){
    e.preventDefault();
    const nv = sfBackspace(el.value);
    el.value = nv;
    sfSyncPreview(el.id);
    sfSetCaretEnd(el);

    // If we removed the ×10 part, also turn EXP off
    if(!/(?:×|x|\*)10/.test(el.value)){
      el.dataset.sfExp = "0";
      const ctrl = preview.querySelector(`.sfctrl[data-sf-target="${el.id}"]`);
      const expBtn = ctrl ? ctrl.querySelector('button[data-act="exp"]') : null;
      if(expBtn){
        expBtn.classList.remove("on");
        expBtn.setAttribute("aria-pressed","false");
      }
    }
    return;
  }

  if(/^[0-9]$/.test(key) || key==="-" || key==="+"){
    e.preventDefault();
    let v = sfEnsureTen(el.value);

    const expRaw = sfGetExpPart(v);
    const expPlain = sfUnsupAll(expRaw);

    // Only allow +/− as the FIRST exponent character
    if((key==="-" || key==="+") && expPlain.length>0) return;

    v += SF_SUP[key] ?? key;
    el.value = v;
    sfSyncPreview(el.id);
    sfSetCaretEnd(el);
    return;
  }
});

// Buttons (EXP / ± / ⌫ / Clear)
preview.addEventListener("click", (e)=>{
  const btn = e.target.closest("button");
  if(!btn) return;

  const ctrl = btn.closest(".sfctrl");
  if(!ctrl) return;

  e.preventDefault();

  const targetId = ctrl.dataset.sfTarget;
  const el = document.getElementById(targetId);
  if(!el) return;

  const act = btn.dataset.act;

  if(act==="clear"){
    el.value = "";
    el.dataset.sfExp = "0";
    btn.classList.remove("on");
    btn.setAttribute("aria-pressed","false");
    sfSyncPreview(targetId);
    el.focus();
    return;
  }

  if(act==="bksp"){
    const nv = sfBackspace(el.value);
    el.value = nv;
    sfSyncPreview(targetId);
    sfSetCaretEnd(el);

    if(!/(?:×|x|\*)10/.test(el.value)){
      el.dataset.sfExp = "0";
      const expBtn = ctrl.querySelector('button[data-act="exp"]');
      if(expBtn){
        expBtn.classList.remove("on");
        expBtn.setAttribute("aria-pressed","false");
      }
    }

    el.focus();
    return;
  }

  if(act==="exp"){
    const expBtn = ctrl.querySelector('button[data-act="exp"]');
    const on = !(el.dataset.sfExp === "1");
    el.dataset.sfExp = on ? "1" : "0";
    if(expBtn){
      expBtn.classList.toggle("on", on);
      expBtn.setAttribute("aria-pressed", on ? "true" : "false");
    }

    if(on){
      el.value = sfEnsureTen(el.value);
      // Do NOT insert ^ or E. Exponent digits will be added as superscripts.
      sfSetCaretEnd(el);
    }

    sfSyncPreview(targetId);
    el.focus();
    return;
  }

  if(act==="neg"){
    // If there is a ×10 part, toggle the exponent sign. Otherwise toggle the mantissa sign.
    if(/(?:×|x|\*)10/.test(el.value)){
      el.value = sfToggleExponentSign(el.value);
    }else{
      el.value = sfToggleMantissaSign(el.value);
    }
    sfSyncPreview(targetId);
    sfSetCaretEnd(el);
    el.focus();
    return;
  }
});

/* -------------------- keypad for prime factors (exp / × / primes) -------------------- */
function pfToHTML(expr){
  if(!expr) return "";
  const parts = String(expr).split("×");
  let out = "";
  for(let i=0;i<parts.length;i++){
    const tok = parts[i];
    if(tok){
      if(tok.includes("^")){
        const [base, exp] = tok.split("^");
        out += `${base}<sup>${exp||""}</sup>`;
      }else{
        out += tok;
      }
    }
    if(i < parts.length-1){
      out += `<span class="mul">×</span>`;
    }
  }
  return out;
}

function pfSetValue(targetId, newVal){
  const hidden = document.getElementById(targetId);
  const box = document.getElementById(targetId+"Box");
  if(!hidden || !box) return;
  hidden.value = newVal;
  box.innerHTML = pfToHTML(newVal);
}

function pfBackspace(expr){
  if(!expr) return "";
  let s = String(expr);
  if(s.endsWith("×")) return s.slice(0,-1);

  const parts = s.split("×");
  if(parts.length===0) return "";
  let last = parts[parts.length-1] || "";

  if(last.includes("^")){
    let [base, exp] = last.split("^");
    exp = exp || "";
    if(exp.length<=1){
      last = base;
    }else{
      last = base + "^" + exp.slice(0,-1);
    }
    parts[parts.length-1] = last;
    return parts.join("×");
  }

  last = last.slice(0,-1);
  if(last===""){
    parts.pop();
    return parts.join("×");
  }
  parts[parts.length-1] = last;
  return parts.join("×");
}

preview.addEventListener("click", (e)=>{
  const btn = e.target.closest("button");
  if(!btn) return;

  const pad = btn.closest(".keypad");
  if(!pad) return;

  e.preventDefault();

  const target = pad.dataset.target;
  const hidden = document.getElementById(target);
  const box = document.getElementById(target+"Box");
  if(!hidden || !box) return;

  const expBtn = pad.querySelector('button[data-act="exp"]');
  const setExp = (on)=>{
    pad.dataset.exp = on ? "1" : "0";
    if(expBtn){
      expBtn.classList.toggle("on", on);
      expBtn.setAttribute("aria-pressed", on ? "true" : "false");
    }
  };

  const isExp = pad.dataset.exp === "1";
  let val = hidden.value || "";

  const act = btn.dataset.act;
  const prime = btn.dataset.prime;
  const digit = btn.dataset.digit;
  const ins = btn.dataset.ins;

  if(act==="clear"){
    pfSetValue(target, "");
    setExp(false);
    return;
  }
  if(act==="bksp"){
    const nv = pfBackspace(val);
    pfSetValue(target, nv);
    // keep exp mode as-is
    return;
  }
  if(act==="exp"){
    if(!val || val.endsWith("×")){ setExp(false); return; }
    setExp(!isExp);
    return;
  }

  if(ins==="×"){
    setExp(false);
    if(!val) return;
    if(val.endsWith("×")) return;
    pfSetValue(target, val + "×");
    return;
  }

  if(prime){
    setExp(false);
    if(val && !val.endsWith("×")) val += "×";
    pfSetValue(target, val + prime);
    return;
  }

  if(typeof digit !== "undefined"){
    if(pad.dataset.exp !== "1") return;
    if(!val || val.endsWith("×")) return;

    const parts = val.split("×");
    let last = parts[parts.length-1] || "";
    if(!last) return;

    let base = last, exp = "";
    if(last.includes("^")){
      [base, exp] = last.split("^");
      exp = exp || "";
    }
    if(exp==="" && digit==="0") return; // no leading zero exponent
    exp += digit;
    parts[parts.length-1] = base + "^" + exp;
    pfSetValue(target, parts.join("×"));
    return;
  }
});

/* -------------------- Answer retrieval -------------------- */
function clearMarks(){
  // remove ok/bad classes from inputs + drag-order tiles
  preview.querySelectorAll("input,select,.dropbox,.dragbox").forEach(el=>{
    el.classList.remove("ok","bad");
  });
}
function markEl(el, ok){
  if(!el) return;
  el.classList.remove("ok","bad");
  el.classList.add(ok ? "ok" : "bad");
}
function getUserAnswerForPart(part){
  const id = part.input?.id;
  const type = part.answer?.type;

  if (part.input?.kind==="order" || type==="order"){
    const hidden = document.getElementById(id);
    const widget = preview.querySelector(`.drag-order[data-drag-order="${id}"]`);
    const drops = widget ? Array.from(widget.querySelectorAll(".dropbox")) : [];

    let arr = null;
    if(hidden && hidden.value){
      try{ arr = JSON.parse(hidden.value); }catch{ arr = null; }
    }
    if(!Array.isArray(arr) && drops.length){
      arr = drops.map(d=>d.querySelector(".dragbox")?.dataset.token ?? null);
    }
    if(!Array.isArray(arr)){
      return {ok:false, val:null, els:drops.length?drops:[hidden].filter(Boolean)};
    }

    const filled = arr.every(x=>x!==null && x!=="" && typeof x!=="undefined");
    return {ok:filled, val:arr, els:drops.length?drops:[hidden].filter(Boolean)};
  }

  if (part.input?.kind==="fraction" || type==="fraction"){
    const nEl = document.getElementById(id+"N");
    const dEl = document.getElementById(id+"D");
    const n = Number(nEl?.value);
    const d = Number(dEl?.value);
    if(!Number.isFinite(n)||!Number.isFinite(d)||d===0) return {ok:false, val:null, els:[nEl,dEl]};
    return {ok:true, val:{n, d}, els:[nEl,dEl]};
  }

  if (part.input?.kind==="pair" || type==="pair"){
    const aEl = document.getElementById(id+"A");
    const bEl = document.getElementById(id+"B");
    const a = asNum(aEl?.value);
    const b = asNum(bEl?.value);
    if(!Number.isFinite(a)||!Number.isFinite(b)) return {ok:false, val:null, els:[aEl,bEl]};
    return {ok:true, val:[a,b], els:[aEl,bEl]};
  }

  if (part.input?.kind==="standardForm" || type==="standardForm"){
    const el = document.getElementById(id);
    const parsed = parseStandardFormInput(el?.value);
    if(!parsed.ok || !Number.isFinite(parsed.A) || !Number.isFinite(parsed.n)) return {ok:false, val:null, els:[el]};
    return {ok:true, val:{A: parsed.A, n: parsed.n}, els:[el]};
  }

  if (part.input?.kind==="primeFactors" || type==="primeFactors"){
    const el = document.getElementById(id);
    const raw = (el?.value ?? "").trim();
    if(!raw) return {ok:false, val:null, els:[el]};
    return {ok:true, val:raw, els:[el]};
  }

  if (part.input?.kind==="symbol" || type==="symbol"){
    const el = document.getElementById(id);
    const v = (el?.value ?? "").trim();
    if(!v) return {ok:false, val:null, els:[el]};
    return {ok:true, val:v, els:[el]};
  }

  if (part.input?.kind==="time" || type==="time"){
    const el = document.getElementById(id);
    const v = (el?.value ?? "").trim();
    if(!v) return {ok:false, val:null, els:[el]};
    return {ok:true, val:v, els:[el]};
  }

  if (part.input?.kind==="integer"){
    const el = document.getElementById(id);
    const x = asNum(el?.value);
    if(!Number.isFinite(x) || !Number.isInteger(x)) return {ok:false, val:null, els:[el]};
    return {ok:true, val:x, els:[el]};
  }

  const el = document.getElementById(id);
  const x = asNum(el?.value);
  if(!Number.isFinite(x)) return {ok:false, val:null, els:[el]};
  return {ok:true, val:x, els:[el]};
}



/* -------------------- prime-factor answer parsing -------------------- */
function parsePrimeFactorString(raw){
  // Accept forms like: 2^3×3×5^2  or 2*2*2*3*25 etc
  // Reject plain "2475" with no × or ^ (not a factorisation).
  const s = raw.replace(/\s+/g,"")
               .replace(/x/gi,"×")
               .replace(/\*/g,"×")
               .replace(/\./g,"×"); // allow dot as multiply
  const hasSep = s.includes("×") || s.includes("^");
  if(!hasSep) return {ok:false, map:null};

  const parts = s.split("×").filter(Boolean);
  if(parts.length===0) return {ok:false, map:null};

  const map = {};
  for(const tok of parts){
    if(tok==="1" || tok==="+1") return {ok:false, map:null}; // disallow 1 as factor
    // exponent form p^e
    if(tok.includes("^")){
      const m = tok.match(/^(\d+)\^(\d+)$/);
      if(!m) return {ok:false, map:null};
      const p = Number(m[1]), e = Number(m[2]);
      if(!(Number.isInteger(p)&&Number.isInteger(e)&&p>=2&&e>=1)) return {ok:false, map:null};
      const f = factorise(p);
      // base should be prime ideally; but allow composite base (we factor it)
      for(const k of Object.keys(f)){
        map[k] = (map[k]||0) + f[k]*e;
      }
    } else {
      // integer factor (prime or composite)
      const v = Number(tok);
      if(!Number.isInteger(v) || v<2) return {ok:false, map:null};
      const f = factorise(v);
      for(const k of Object.keys(f)){
        map[k] = (map[k]||0) + f[k];
      }
    }
  }
  return {ok:true, map};
}

/* -------------------- marking -------------------- */
function markCurrent(){
  if(!current) return;

  clearMarks();

  let score = 0;
  let max = current.marksTotal;

  for(const part of current.parts){
    const expected = part.answer;
    const got = getUserAnswerForPart(part);
    const pm = part.marks ?? 0;

    // Drag-order marking (2 marks in the higher-order questions).
    if(expected && expected.type==="order"){
      const correct = Array.isArray(expected.value) ? expected.value : [];
      const user = Array.isArray(got.val) ? got.val : [];
      let partScore = 0;

      if(user.length === correct.length && got.els && got.els.length){
        let correctCount = 0;

        got.els.forEach((el,i)=>{
          const posOk = Boolean(got.ok) && (user[i] === correct[i]);
          if(posOk) correctCount++;
          markEl(el, posOk);
        });

        if(Boolean(got.ok) && correctCount === correct.length){
          partScore = pm;
        } else if(Boolean(got.ok) && pm>=2 && correctCount >= Math.ceil(correct.length/2)){
          partScore = 1; // partial credit
        } else {
          partScore = 0;
        }
      } else {
        if(got.els && got.els.length) got.els.forEach(el=>markEl(el,false));
        partScore = 0;
      }

      score += partScore;
      continue;
    }

    let ok = false;
    let partScore = 0;

    if(!got.ok){
      ok = false;
      partScore = 0;
    } else if(expected.type==="fraction"){
      ok = fracEq(got.val, expected.value);
    } else if(expected.type==="pair"){
      ok = close(got.val[0], expected.value[0], 1e-6) && close(got.val[1], expected.value[1], 1e-6);
    } else if(expected.type==="standardForm"){
      // require standard form: 1 ≤ A < 10 and integer n
      const A = got.val.A;
      const n = got.val.n;
      const userVal = A * (10**n);
      const targetVal = expected.value;
      ok = Number.isFinite(userVal) && Number.isFinite(A) && Number.isInteger(n) && A>=1 && A<10 &&
           close(userVal, targetVal, Math.max(1e-9, Math.abs(targetVal)*1e-8));
    } else if(expected.type==="primeFactors"){
      const parsed = parsePrimeFactorString(got.val);
      ok = parsed.ok && mapsEqual(parsed.map, expected.value);
    } else if(expected.type==="symbol"){
      ok = got.val === expected.value;
    } else if(expected.type==="time"){
      ok = String(got.val).trim() === String(expected.value).trim();
    } else {
      // number (with rounding / partial-credit rule when a dp requirement is present)
      const tol = Math.max(1e-9, Math.abs(expected.value)*1e-8);
      const exactOk = close(got.val, expected.value, tol);

      if(typeof expected.dp === "number"){
        const dp = expected.dp;

        // Check the student's *written* format (must show exactly dp decimal places).
        const raw = (got.els && got.els[0]) ? String(got.els[0].value).trim() : String(got.val);
        const fmtOk = new RegExp(`^[+-]?(?:\\d+\\.\\d{${dp}}|\\.\\d{${dp}})$`).test(raw);

        // Full marks only if BOTH value and formatting match.
        if(exactOk && fmtOk){
          ok = true;
          partScore = pm;
        } else if(Math.abs(got.val - expected.value) <= 1){
          // Within ±1 of the correctly rounded answer: lose 1 mark but keep the rest.
          ok = false;
          partScore = Math.max(0, pm - 1);
        } else {
          ok = false;
          partScore = 0;
        }
      } else {
        ok = exactOk;
      }
    }

    if(partScore===0 && ok) partScore = pm;

    // Mark UI elements (green only for full marks)
    if(got.els && got.els.length){
      got.els.forEach(el=>markEl(el, ok));
    }

    score += partScore;
  }

  fb.style.display="block";
  fb.className = "feedback " + (score===max ? "good" : (score>0 ? "" : "bad"));
  fb.innerHTML = `<b>Score:</b> ${score} / ${max}`;
}

function revealCurrent(){
  if(!current) return;
  const fb = document.getElementById("fb");
  if(!fb) return;
  fb.style.display = "block";

  const formatStd = (v)=>{
    const num = Number(v);
    if(!isFinite(num)) return String(v);
    if(num===0) return "0"; // avoid 10^0
    const sign = num<0 ? "−" : "";
    const abs = Math.abs(num);
    const n = Math.floor(Math.log10(abs));
    if(n===0) return sign + fmt(abs,4); // avoid 10^0
    const A = abs / Math.pow(10,n);
    return `${sign}${fmt(A,4)} × 10<sup>${n}</sup>`;
  };

  const formatPF = (map)=>{
    const parts = Object.entries(map)
      .sort((a,b)=>Number(a[0])-Number(b[0]))
      .map(([p,e])=>{
        const ee = Number(e);
        return ee===1 ? `${p}` : `${p}<sup>${ee}</sup>`;
      });
    return parts.join(" × ");
  };

  const answers = current.parts.map(p=>{
    const ex = p.answer;
    if(!ex) return "";
    if(ex.type==="fraction"){
      return mfrac(ex.value.n, ex.value.d);
    }
    if(ex.type==="order"){
      const tok=(t)=>{const s=String(t);const m=s.match(/^(-?\d+)\s*\/\s*(\d+)$/);return m?mfrac(parseInt(m[1],10),parseInt(m[2],10)):s;};
      return ex.value.map(tok).join(", ");
    }
    if(ex.type==="pair"){
      return `(${ex.value[0]}, ${ex.value[1]})`;
    }
    if(ex.type==="primeFactors"){
      return formatPF(ex.value);
    }
    if(ex.type==="standardForm"){
      return formatStd(ex.value);
    }
    if(ex.type==="time"){
      return String(ex.value);
    }
    if(ex.type==="number" && typeof ex.dp==="number"){
      return Number(ex.value).toFixed(ex.dp);
    }
    if(p.input && p.input.kind==="money"){
      return "£" + Number(ex.value).toFixed(2);
    }
    return String(ex.value);
  });

  fb.innerHTML = `
    <div style="margin-top:10px">
      <b>Answers:</b>
      <ol style="margin:8px 0 0 18px">
        ${answers.map(a=>`<li>${a}</li>`).join("")}
      </ol>
    </div>
  `;
}




function generateNew(){

  let q = buildQuestion(topic, marks, paperMode, rng);

  if(q.topicCode==="N11" && q.marksTotal===3){
    // we generated a placeholder null; replace with a consistent y equation
    const xAns = q.parts[0].answer.value;
    const k = Math.floor(Math.random()*19)+2; // 2..20, OK for patch only
    q.parts[1].textHtml = `Now find <b>y</b>: <b>y − ${xAns} = ${k}</b>. <span class="endmark">[1]</span>`;
    q.parts[1].answer.value = xAns + k;
  }

  // Safety: ensure marks sum
  const sum = q.parts.reduce((s,p)=>s+(p.marks||0),0);
  if(sum !== q.marksTotal){
    console.warn("Marks mismatch; adjusting", {sum, expected:q.marksTotal});
    // force 1 mark each then remainder on last
    const parts = q.parts.map(p=>({...p, marks:1}));
    const remainder = q.marksTotal - parts.length;
    if(remainder>0) parts[parts.length-1].marks += remainder;
    q.parts = parts;
  }

  current = q;
  renderQuestion(q);
}

          partInteger("n12_3a", n12Block(intro, `(a) Write down one of these factors.`, 1), 1, chosen.triple[0]),
          partInteger("n12_3b", n12Block("", `(b) Write down a different one of these factors.`, 1), 1, chosen.triple[1]),
          partInteger("n12_3c", n12Block("", `(c) Write down the third factor.`, 1), 1, chosen.triple[2]),
        ];
        const reveal = chosen.triple.map(v=>`<b>${v}</b>`);
        const customMark = ()=>{
          const score = n12ScoreFromSet(parts, chosen.triple);
          return {score, max: 3};
        };
        return done(parts, reveal, customMark);
      }

      if(scenario === 2){
        const cfg = rng.choice(isCalc ? N12_PRIME_SQUARE_CALC : N12_PRIME_SQUARE_NC);
        const root = Math.round(Math.sqrt(cfg.target));
        const intro = `A number is between <b>${cfg.low}</b> and <b>${cfg.high}</b> and has exactly three factors.`;
        const parts = [
          partInteger("n12_3d", n12Block(intro, `(a) Find the number.`, 1), 1, cfg.target),
          partInteger("n12_3e", n12Block("", `(b) Write down the factor of this number that is greater than 1 and less than the number.`, 1), 1, root),
          partInteger("n12_3f", n12Block("", `(c) Write down how many factors this number has.`, 1), 1, 3),
        ];
        const reveal = [
          `<b>${cfg.target}</b>`,
          `<b>${root}</b>`,
          `<b>3</b>`
        ];
        const customMark = ()=>{
          let score = 0;
          const a = n12ReadPart(parts[0]);
          const b = n12ReadPart(parts[1]);
          const c = n12ReadPart(parts[2]);

          let aScore = 0;
          let aExact = false;
          if(a.ok && a.val === cfg.target){
            aScore = 1;
            aExact = true;
          } else if(a.ok && n12IsSquare(a.val) && n12StrictBetween(a.val, cfg.low, cfg.high)){
            aScore = 1;
          }
          markEl(a.el, aScore > 0);
          score += aScore;

          const bOk = aExact && b.ok && b.val === root;
          markEl(b.el, bOk);
          if(bOk) score += 1;

          const cOk = c.ok && c.val === 3;
          markEl(c.el, cOk);
          if(cOk) score += 1;

          return {score, max: 3};
        };
        return done(parts, reveal, customMark);
      }

      const cfg = rng.choice(isCalc ? N12_SQUARE_MULTIPLE_CALC : N12_SQUARE_MULTIPLE_NC);
      const spf = n12SmallestPrimeFactor(cfg.target);
      const greatestLess = n12ProperFactors(cfg.target).slice(-1)[0];
      const intro = isCalc
        ? `A number is between <b>${cfg.low}</b> and <b>${cfg.high}</b>.<br>It is a square number and also a multiple of <b>${cfg.multiple}</b>.`
        : `A number less than <b>${cfg.upper}</b> is a square number and also a multiple of <b>${cfg.multiple}</b>.`;
      const parts = [
        partInteger("n12_3g", n12Block(intro, `(a) Find the number.`, 1), 1, cfg.target),
        partInteger("n12_3h", n12Block("", `(b) Write down the smallest prime factor of this number.`, 1), 1, spf),
        partInteger("n12_3i", n12Block("", `(c) Write down the greatest factor of this number that is less than the number.`, 1), 1, greatestLess),
      ];
      const reveal = [
        `<b>${cfg.target}</b>`,
        `<b>${spf}</b>`,
        `<b>${greatestLess}</b>`
      ];
      const customMark = ()=>{
        let score = 0;
        const a = n12ReadPart(parts[0]);
        const b = n12ReadPart(parts[1]);
        const c = n12ReadPart(parts[2]);

        const inRange = (v)=> isCalc ? n12StrictBetween(v, cfg.low, cfg.high) : (Number.isFinite(v) && v < cfg.upper);

        let aScore = 0;
        let aExact = false;
        if(a.ok && a.val === cfg.target){
          aScore = 1;
          aExact = true;
        } else if(a.ok && n12IsSquare(a.val) && inRange(a.val)){
          aScore = 1;
        }
        markEl(a.el, aScore > 0);
        score += aScore;

        const bOk = aExact && b.ok && b.val === spf;
        const cOk = aExact && c.ok && c.val === greatestLess;
        markEl(b.el, bOk);
        markEl(c.el, cOk);
        if(bOk) score += 1;
        if(cOk) score += 1;

        return {score, max: 3};
      };
      return done(parts, reveal, customMark);
    }

    if(marksTotal === 4){
      const scenario = rng.int(1,3);

      if(scenario === 1){
        const cfg = rng.choice(isCalc ? N12_LIST_CONFIG_CALC : N12_LIST_CONFIG_NC);
        let list = [];
        let validMultiples = [];
        let validFactors = [];
        for(let tries=0; tries<300; tries++){
          const multPool = [];
          const factorPool = [];
          const neitherPool = [];
          for(let x=cfg.min; x<=cfg.max; x++){
            const isMult = x % cfg.base === 0;
            const isFactor = cfg.target % x === 0;
            if(isMult) multPool.push(x);
            if(isFactor) factorPool.push(x);
            if(!isMult && !isFactor) neitherPool.push(x);
          }
          const items = [];
          n12PushUnique(items, n12Sample(rng, multPool, 3));
          n12PushUnique(items, n12Sample(rng, factorPool, 3));
          while(items.length < cfg.total){
            const x = rng.choice(neitherPool.concat(multPool).concat(factorPool));
            if(!items.includes(x)) items.push(x);
          }
          list = n12Sorted(items);
          validMultiples = n12Sorted(list.filter(x=>x % cfg.base === 0));
          validFactors = n12Sorted(list.filter(x=>cfg.target % x === 0));
          if(validMultiples.length >= 2 && validFactors.length >= 2) break;
        }

        const intro = `From the list below<br><b>${list.join(", ")}</b>`;
        const parts = [
          partInteger("n12_4a", n12Block(intro, `(a) Write down ONE number that is a multiple of <b>${cfg.base}</b>.`, 1), 1, validMultiples[0]),
          partInteger("n12_4b", n12Block("", `(b) Write down a different number that is a multiple of <b>${cfg.base}</b>.`, 1), 1, validMultiples[1]),
          partInteger("n12_4c", n12Block("", `(c) Write down ONE number that is a factor of <b>${cfg.target}</b>.`, 1), 1, validFactors[0]),
          partInteger("n12_4d", n12Block("", `(d) Write down a different number that is a factor of <b>${cfg.target}</b>.`, 1), 1, validFactors[1]),
        ];
        const reveal = [
          `<b>${validMultiples[0]}</b>`,
          `<b>${validMultiples[1]}</b>`,
          `<b>${validFactors[0]}</b>`,
          `<b>${validFactors[1]}</b>`
        ];
        const customMark = ()=>{
          let score = 0;
          score += n12ScoreDistinctValid(parts.slice(0,2), v=>list.includes(v) && v % cfg.base === 0);
          score += n12ScoreDistinctValid(parts.slice(2,4), v=>list.includes(v) && cfg.target % v === 0);
          return {score, max: 4};
        };
        return done(parts, reveal, customMark);
      }

      if(scenario === 2){
        const pool = isCalc
          ? [66,70,72,84,90,96,104,108,120,126]
          : [42,44,45,50,52,54,60,63,70,72,84];
        let cfg = null;
        for(let tries=0; tries<300 && !cfg; tries++){
          const n = rng.choice(pool);
          const threshold = 10;
          const bigFactors = n12Sorted(n12Factors(n).filter(x=>x > threshold));
          const pairChoices = n12UniqueFactorPairs(n).filter(obj=>obj.pair[0] > 1 && obj.pair[1] > 1 && obj.sum >= 12 && obj.sum <= 60);
          if(bigFactors.length >= 2 && pairChoices.length){
            const pick = rng.choice(pairChoices);
            cfg = {
              n,
              threshold,
              bigFactors,
              sumTarget: pick.sum,
              pair: pick.pair
            };
          }
        }
        if(!cfg){
          cfg = {n:42, threshold:10, bigFactors:[14,21,42], sumTarget:20, pair:[6,14]};
        }

        const parts = [
          partInteger("n12_4e", n12Block("", `(a) Write down ONE factor of <b>${cfg.n}</b> that is greater than <b>${cfg.threshold}</b>.`, 1), 1, cfg.bigFactors[0]),
          partInteger("n12_4f", n12Block("", `(b) Write down a different factor of <b>${cfg.n}</b> that is greater than <b>${cfg.threshold}</b>.`, 1), 1, cfg.bigFactors[1]),
          partInteger("n12_4g", n12Block("", `(c) Write down ONE factor of <b>${cfg.n}</b> that adds with another factor of <b>${cfg.n}</b> to make <b>${cfg.sumTarget}</b>.`, 1), 1, cfg.pair[0]),
          partInteger("n12_4h", n12Block("", `(d) Write down the other factor.`, 1), 1, cfg.pair[1]),
        ];
        const reveal = [
          `<b>${cfg.bigFactors[0]}</b>`,
          `<b>${cfg.bigFactors[1]}</b>`,
          `<b>${cfg.pair[0]}</b>`,
          `<b>${cfg.pair[1]}</b>`
        ];
        const customMark = ()=>{
          let score = 0;
          score += n12ScoreDistinctValid(parts.slice(0,2), v=>cfg.bigFactors.includes(v));
          score += n12ScoreFromSet(parts.slice(2,4), cfg.pair);
          return {score, max: 4};
        };
        return done(parts, reveal, customMark);
      }

      const cfg = rng.choice(isCalc ? N12_PRIME_SQUARE_CALC : N12_PRIME_SQUARE_NC);
      const root = Math.round(Math.sqrt(cfg.target));
      const multBase = isCalc ? rng.choice([11,12,13,14,15]) : rng.choice([7,8,9,11]);
      const start = rng.int(1,2);
      const mults = [start, start+1, start+2, start+3, start+4].map(m=>m*multBase);
      const intruderIndex = rng.int(1,3);
      let intruder = mults[intruderIndex];
      const prev = mults[intruderIndex-1];
      const next = mults[intruderIndex+1];
      for(let tries=0; tries<200; tries++){
        const candidate = rng.int(prev+1, next-1);
        if(candidate % multBase !== 0){
          intruder = candidate;
          break;
        }
      }
      const intruderList = mults.slice();
      intruderList[intruderIndex] = intruder;
      const introA = `A number has exactly 3 factors.<br>The number is between <b>${cfg.low}</b> and <b>${cfg.high}</b>.`;
      const introC = `Peter wrote these as multiples of <b>${multBase}</b>:<br><b>${intruderList.join(", ")}</b>`;
      const parts = [
        partInteger("n12_4i", n12Block(introA, `(a) Find this number.`, 2), 2, cfg.target),
        partInteger("n12_4j", n12Block("", `(b) Write down the factor of this number that is greater than 1 and less than the number.`, 1), 1, root),
        partInteger("n12_4k", n12Block(introC, `(c) Write down the intruder.`, 1), 1, intruder),
      ];
      const reveal = [
        `<b>${cfg.target}</b>`,
        `<b>${root}</b>`,
        `<b>${intruder}</b>`
      ];
      const customMark = ()=>{
        let score = 0;
        const a = n12ReadPart(parts[0]);
        const b = n12ReadPart(parts[1]);
        const c = n12ReadPart(parts[2]);

        let aScore = 0;
        let aExact = false;
        if(a.ok && a.val === cfg.target){
          aScore = 2;
          aExact = true;
        } else if(a.ok && n12IsSquare(a.val) && n12StrictBetween(a.val, cfg.low, cfg.high)){
          aScore = 1;
        }
        markEl(a.el, aScore > 0);
        score += aScore;

        const bOk = aExact && b.ok && b.val === root;
        const cOk = c.ok && c.val === intruder;
        markEl(b.el, bOk);
        markEl(c.el, cOk);
        if(bOk) score += 1;
        if(cOk) score += 1;

        return {score, max: 4};
      };
      return done(parts, reveal, customMark);
    }

    if(marksTotal === 5){
      const scenario = rng.int(1,3);

      if(scenario === 1){
        const cfg = rng.choice(isCalc ? N12_FIVE_A_CALC : N12_FIVE_A_NC);
        const symbol = "N";
        const actualFactorCount = n12FactorCount(cfg.target);
        const actualGpf = n12GreatestPrimeFactor(cfg.target);
        const intro = n12Bullets(
          `A whole number <b>${symbol}</b> is between <b>${cfg.low}</b> and <b>${cfg.high}</b>.`,
          [
            `${symbol} is a multiple of <b>${cfg.multiple}</b>.`,
            `${symbol} has exactly <b>${cfg.tau}</b> factors.`,
            `The sum of the digits of ${symbol} is <b>${cfg.digitSum}</b>.`,
            `One prime factor of ${symbol} is greater than <b>${cfg.primeThreshold}</b>.`
          ]
        );
        const parts = [
          partInteger("n12_5a", n12Block(intro, `(a) Write down the value of <b>${symbol}</b>.`, 1), 1, cfg.target),
          partInteger("n12_5b", n12Block("", `(b) Write down the total number of factors of <b>${symbol}</b>.`, 1), 1, actualFactorCount),
          partInteger("n12_5c", n12Block("", `(c) Write down the greatest prime factor of <b>${symbol}</b>.`, 1), 1, actualGpf),
          partInteger("n12_5d", n12Block("", `(d) Write down one factor of <b>${symbol}</b> that is greater than <b>${cfg.intervalLo}</b> and less than <b>${cfg.intervalHi}</b>.`, 1), 1, cfg.exampleFactor),
          partInteger("n12_5e", n12Block("", `(e) Write down the sum of the digits of <b>${symbol}</b>.`, 1), 1, cfg.digitSum),
        ];
        const reveal = [
          `<b>${cfg.target}</b>`,
          `<b>${actualFactorCount}</b>`,
          `<b>${actualGpf}</b>`,
          `One possible answer: <b>${cfg.exampleFactor}</b>`,
          `<b>${cfg.digitSum}</b>`
        ];
        const customMark = ()=>{
          let score = 0;
          const a = n12ReadPart(parts[0]);
          const ref = (a.ok && n12StrictBetween(a.val, cfg.low, cfg.high)) ? a.val : null;
          const aOk = a.ok && a.val === cfg.target;
          markEl(a.el, aOk);
          if(aOk) score += 1;

          const checks = [
            {part: parts[1], test: (val, n)=> val === n12FactorCount(n)},
            {part: parts[2], test: (val, n)=> val === n12GreatestPrimeFactor(n)},
            {part: parts[3], test: (val, n)=> n % val === 0 && n12StrictBetween(val, cfg.intervalLo, cfg.intervalHi)},
            {part: parts[4], test: (val, n)=> val === n12DigitSum(n)}
          ];

          for(const item of checks){
            const g = n12ReadPart(item.part);
            const ok = g.ok && (
              item.test(g.val, cfg.target) ||
              (ref !== null && item.test(g.val, ref))
            );
            markEl(g.el, ok);
            if(ok) score += (item.part.marks || 1);
          }

          return {score, max: 5};
        };
        return done(parts, reveal, customMark);
      }

      if(scenario === 2){
        const cfg = rng.choice(isCalc ? N12_FIVE_B_CALC : N12_FIVE_B_NC);
        const symbol = "M";
        const actualFactorCount = n12FactorCount(cfg.target);
        const actualGpf = n12GreatestPrimeFactor(cfg.target);
        const intro = n12Bullets(
          `A whole number <b>${symbol}</b> is between <b>${cfg.low}</b> and <b>${cfg.high}</b>.`,
          [
            `${symbol} is a multiple of <b>${cfg.multiple}</b>.`,
            `${symbol} is not a multiple of <b>${cfg.notMultiple}</b>.`,
            `${symbol} has exactly <b>${cfg.tau}</b> factors.`,
            `When you add the digits of ${symbol}, the total is <b>${cfg.digitSum}</b>.`
          ]
        );
        const parts = [
          partInteger("n12_5f", n12Block(intro, `(a) Write down the value of <b>${symbol}</b>.`, 1), 1, cfg.target),
          partInteger("n12_5g", n12Block("", `(b) Write down the total number of factors of <b>${symbol}</b>.`, 1), 1, actualFactorCount),
          partInteger("n12_5h", n12Block("", `(c) Write down the greatest prime factor of <b>${symbol}</b>.`, 1), 1, actualGpf),
          partInteger("n12_5i", n12Block("", `(d) Write down a factor of <b>${symbol}</b>, other than 1 and ${symbol}, that is greater than <b>${cfg.intervalLo}</b> and less than <b>${cfg.intervalHi}</b>.`, 1), 1, cfg.exampleFactor),
          partInteger("n12_5j", n12Block("", `(e) Write down the sum of the digits of <b>${symbol}</b>.`, 1), 1, cfg.digitSum),
        ];
        const reveal = [
          `<b>${cfg.target}</b>`,
          `<b>${actualFactorCount}</b>`,
          `<b>${actualGpf}</b>`,
          `One possible answer: <b>${cfg.exampleFactor}</b>`,
          `<b>${cfg.digitSum}</b>`
        ];
        const customMark = ()=>{
          let score = 0;
          const a = n12ReadPart(parts[0]);
          const ref = (a.ok && n12StrictBetween(a.val, cfg.low, cfg.high)) ? a.val : null;
          const aOk = a.ok && a.val === cfg.target;
          markEl(a.el, aOk);
          if(aOk) score += 1;

          const checks = [
            {part: parts[1], test: (val, n)=> val === n12FactorCount(n)},
            {part: parts[2], test: (val, n)=> val === n12GreatestPrimeFactor(n)},
            {part: parts[3], test: (val, n)=> n % val === 0 && n12StrictBetween(val, cfg.intervalLo, cfg.intervalHi) && val !== 1 && val !== n},
            {part: parts[4], test: (val, n)=> val === n12DigitSum(n)}
          ];

          for(const item of checks){
            const g = n12ReadPart(item.part);
            const ok = g.ok && (
              item.test(g.val, cfg.target) ||
              (ref !== null && item.test(g.val, ref))
            );
            markEl(g.el, ok);
            if(ok) score += (item.part.marks || 1);
          }

          return {score, max: 5};
        };
        return done(parts, reveal, customMark);
      }

      const cfg = rng.choice(isCalc ? N12_FIVE_C_CALC : N12_FIVE_C_NC);
      const symbol = "P";
      const actualFactorCount = n12FactorCount(cfg.target);
      const actualGpf = n12GreatestPrimeFactor(cfg.target);
      const intro = n12Bullets(
        `A whole number <b>${symbol}</b> is between <b>${cfg.low}</b> and <b>${cfg.high}</b>.`,
        [
          `${symbol} is a common multiple of <b>${cfg.commonA}</b> and <b>${cfg.commonB}</b>.`,
          `${symbol} has more than <b>${cfg.minFactorCount}</b> factors.`,
          `One of the factors of ${symbol} is <b>${cfg.requiredFactor}</b>.`,
          `${symbol} is not a square number.`
        ]
      );
      const parts = [
        partInteger("n12_5k", n12Block(intro, `(a) Write down the value of <b>${symbol}</b>.`, 1), 1, cfg.target),
        partInteger("n12_5l", n12Block("", `(b) Write down the total number of factors of <b>${symbol}</b>.`, 1), 1, actualFactorCount),
        partInteger("n12_5m", n12Block("", `(c) Write down the greatest prime factor of <b>${symbol}</b>.`, 1), 1, actualGpf),
        partInteger("n12_5n", n12Block("", `(d) Write down one factor of <b>${symbol}</b> that is greater than <b>40</b> and less than <b>50</b>.`, 1), 1, cfg.exampleFactor1),
        partInteger("n12_5o", n12Block("", `(e) Write down one other factor of <b>${symbol}</b> that is greater than <b>20</b> and less than <b>40</b>.`, 1), 1, cfg.exampleFactor2),
      ];
      const reveal = [
        `<b>${cfg.target}</b>`,
        `<b>${actualFactorCount}</b>`,
        `<b>${actualGpf}</b>`,
        `One possible answer: <b>${cfg.exampleFactor1}</b>`,
        `One possible answer: <b>${cfg.exampleFactor2}</b>`
      ];
      const customMark = ()=>{
        let score = 0;
        const a = n12ReadPart(parts[0]);
        const ref = (a.ok && n12StrictBetween(a.val, cfg.low, cfg.high)) ? a.val : null;
        const aOk = a.ok && a.val === cfg.target;
        markEl(a.el, aOk);
        if(aOk) score += 1;

        const checks = [
          {part: parts[1], test: (val, n)=> val === n12FactorCount(n)},
          {part: parts[2], test: (val, n)=> val === n12GreatestPrimeFactor(n)},
          {part: parts[3], test: (val, n)=> n % val === 0 && n12StrictBetween(val, 40, 50)},
          {part: parts[4], test: (val, n)=> n % val === 0 && n12StrictBetween(val, 20, 40)}
        ];

        for(const item of checks){
          const g = n12ReadPart(item.part);
          const ok = g.ok && (
            item.test(g.val, cfg.target) ||
            (ref !== null && item.test(g.val, ref))
          );
          markEl(g.el, ok);
          if(ok) score += (item.part.marks || 1);
        }

        return {score, max: 5};
      };
      return done(parts, reveal, customMark);
    }

    return __origBuildQuestion("N12", marksTotal, paperMode, rng);
  }

  buildQuestion = function(topicCode, marksTotal, paperMode, rng){
    if(topicCode === "N12"){
      return n12BuildQuestion(marksTotal, paperMode, rng);
    }
    return __origBuildQuestion(topicCode, marksTotal, paperMode, rng);
  };

  const checkBtnEl = document.getElementById("checkBtn");
  if(checkBtnEl){
    checkBtnEl.addEventListener("click", (e)=>{
      e.preventDefault();
      e.stopImmediatePropagation();
      if(current && typeof current.customMark === "function"){
        clearMarks();
        const result = current.customMark() || {};
        const fbEl = document.getElementById("fb");
        const score = Number(result.score ?? 0);
        const max = Number(result.max ?? (current ? current.marksTotal : 0));
        if(fbEl){
          fbEl.style.display = "block";
          fbEl.className = "feedback " + (score===max ? "good" : (score>0 ? "" : "bad"));
          fbEl.innerHTML = result.html || `<b>Score:</b> ${score} / ${max}`;
        }
      } else {
        __origMarkCurrent();
      }
    }, true);
  }

  const revealBtnEl = document.getElementById("revealBtn");
  if(revealBtnEl){
    revealBtnEl.addEventListener("click", (e)=>{
      e.preventDefault();
      e.stopImmediatePropagation();
      const answers = current && (typeof current.revealAnswers === "function" ? current.revealAnswers() : current.revealAnswers);
      if(current && Array.isArray(answers)){
        const fbEl = document.getElementById("fb");
        if(fbEl){
          fbEl.style.display = "block";
          fbEl.className = "feedback";
          fbEl.innerHTML = `
            <div style="margin-top:10px">
              <b>Answers:</b>
              <ol style="margin:8px 0 0 18px">
                ${answers.map(a=>`<li>${a}</li>`).join("")}
              </ol>
            </div>
          `;
        }
      } else {
        __origRevealCurrent();
      }
    }, true);
  }

  const topicEl = document.getElementById("topicSel");
  if(topicEl && topicEl.value === "N12"){
    generateNew();
  }
})();
</script>
